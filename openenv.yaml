name: enterprise-ap-env
version: 1.0.0
description: >
  An Enterprise Multi-App AI agent environment. 
  The agent must read emails to find invoices, query an ERP system for Purchase Orders,
  handle schema drift, extract fields, and make approve/reject decisions.

author: dharmendra
tags:
  - enterprise-ap
  - finance
  - multi-agent
  - enterprise-workflow
  - schema-drift

tasks:
  - name: easy
    description: Read email to get invoice, query ERP to get PO, extract all fields and approve.
    max_steps: 20
    reward_range: [0.0, 1.0]

  - name: medium
    description: Read email, query ERP, and detect line item price mismatch.
    max_steps: 20
    reward_range: [0.0, 1.0]

  - name: hard
    description: Multi-App workflow with Schema Drift. ERP requires tax_id instead of vendor_name. Detect duplicate invoice.
    max_steps: 20
    reward_range: [0.0, 1.0]

  - name: expert_negotiation
    description: Multi-Agent interaction. Negotiate with vendor via email to resolve a price discrepancy before approving.
    max_steps: 25
    reward_range: [0.0, 1.0]

  - name: expert_fraud
    description: Fraud detection. Invoice looks valid but comes from a lookalike email domain and uses a fraudulent IBAN. Agent must flag both and reject.
    max_steps: 20
    reward_range: [0.0, 1.0]

observation_space:
  inbox_status: array
  email_content: string
  invoice_text: string
  erp_response: object
  extracted_fields: object
  flags: array
  current_step: integer
  message: string

action_space:
  action_type:
    type: string
    values: [read_email, query_erp, extract, match_po, flag, approve, reject, match_duplicate, send_email]
  field_name:
    type: string
    optional: true
  field_value:
    type: any
    optional: true
  reason:
    type: string
    optional: true
  email_id:
    type: string
    optional: true
  api_endpoint:
    type: string
    optional: true
  api_payload:
    type: object
    optional: true
  email_subject:
    type: string
    optional: true
  email_body:
    type: string
    optional: true

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state

runtime:
  port: 7860
  health_check: GET /health

rubric:
  - name: multi_app_floor
    description: >
      Hard floor of 0.10 if the agent never queries the ERP system.
      Enforces the multi-app workflow requirement.
    weight: 0.0

  - name: field_extraction
    description: >
      40% of the final score. Agent must correctly extract all 8 structured
      fields from unstructured invoice email text: vendor_name, invoice_number,
      invoice_date, due_date, subtotal, tax_amount, total_amount, iban.
    weight: 0.40

  - name: flags_and_negotiation
    description: >
      30% of the final score. Agent must raise the correct flags for each task
      (price_mismatch, tax_mismatch, duplicate_invoice, fraud, fraud_iban) or
      complete vendor negotiation for the expert_negotiation task.
    weight: 0.30

  - name: final_decision
    description: >
      30% of the final score. Agent must make the correct terminal decision:
      approve for valid invoices, reject for any invoice with raised flags.
    weight: 0.30