name: invoice-env
version: 1.0.0
description: >
  An AI agent environment for invoice processing and accounts payable validation.
  The agent must extract fields, detect discrepancies, match purchase orders,
  and make approve/reject decisions on invoices.

author: dharmendra
tags:
  - invoice
  - finance
  - document-processing
  - accounts-payable

tasks:
  - name: easy
    description: Extract all fields from a clean invoice and match to purchase order
    max_steps: 20
    reward_range: [0.0, 1.0]

  - name: medium
    description: Detect line item price mismatch between invoice and purchase order
    max_steps: 20
    reward_range: [0.0, 1.0]

  - name: hard
    description: Detect duplicate invoice, wrong tax calculation
    max_steps: 20
    reward_range: [0.0, 1.0]

observation_space:
  invoice_text: string
  po_data: object
  extracted_fields: object
  flags: array
  current_step: integer
  message: string

action_space:
  action_type:
    type: string
    values: [extract, match_po, flag, approve, reject, match_duplicate]
  field_name:
    type: string
    optional: true
  field_value:
    type: any
    optional: true
  reason:
    type: string
    optional: true

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state

runtime:
  port: 7860
  health_check: GET /health